<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKAL — Indigenous Peoples of the World</title>
<meta name="description" content="AKAL — global reference platform on Indigenous Peoples and pastoralism: UN-style fact sheets, world map, rights observatory and opportunities. EN · FR · ES.">
<meta name="theme-color" content="#1F2A5E">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%231F2A5E'/><text x='50' y='72' font-size='62' text-anchor='middle' fill='%23E9C46A' font-family='Georgia'>ⴰ</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --indigo:#1F2A5E; --indigo-deep:#141C42; --sable:#FAF7F1; --sable-2:#F1EBDD;
  --laterite:#B45E23; --laterite-soft:#E8D9C8; --encre:#1D1B17; --gris:#6B675E;
  --ligne:#DDD5C4; --blanc:#FFF; --ok:#2F6B4F;
  --serif:Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--sable);color:var(--encre);line-height:1.65;font-size:16px}
button{font-family:var(--sans)}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

/* Header */
.topbar{background:var(--indigo-deep);color:#C9CEE6;font-size:12.5px;padding:6px 24px;display:flex;justify-content:space-between;letter-spacing:.02em}
.topbar .tif{letter-spacing:.35em;opacity:.75}
header{background:var(--indigo);color:#fff;position:sticky;top:0;z-index:1000;box-shadow:0 2px 12px rgba(20,28,66,.25)}
.brandrow{display:flex;align-items:center;justify-content:space-between;padding:13px 24px;max-width:1200px;margin:0 auto;gap:12px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px;cursor:pointer}
.brand .mark{width:44px;height:44px;border:1.5px solid rgba(255,255,255,.5);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#E9C46A;font-family:var(--serif)}
.brand h1{font-family:var(--serif);font-size:22px;font-weight:600;line-height:1.1}
.brand small{display:block;font-family:var(--sans);font-size:11px;font-weight:400;opacity:.75;letter-spacing:.13em;text-transform:uppercase;margin-top:3px}
.hdr-actions{display:flex;align-items:center;gap:10px}
.searchbtn{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff;border-radius:4px;padding:6px 13px;font-size:12.5px;cursor:pointer;display:flex;align-items:center;gap:8px}
.searchbtn:hover{border-color:#fff}
.searchbtn kbd{background:rgba(255,255,255,.15);border-radius:3px;padding:1px 6px;font-size:11px}
.langsel{display:flex;border:1px solid rgba(255,255,255,.35);border-radius:4px;overflow:hidden}
.langsel button{background:transparent;border:none;color:#fff;padding:6px 11px;font-size:12.5px;cursor:pointer}
.langsel button.on{background:#fff;color:var(--indigo);font-weight:700}
.cta{background:var(--laterite);color:#fff;border:none;padding:9px 17px;border-radius:4px;font-size:13.5px;font-weight:600;cursor:pointer}
.cta:hover{background:#9E501B}
nav{border-top:1px solid rgba(255,255,255,.15)}
nav ul{max-width:1200px;margin:0 auto;display:flex;list-style:none;overflow-x:auto}
nav a{display:block;padding:12px 15px;color:rgba(255,255,255,.85);text-decoration:none;font-size:13.5px;white-space:nowrap;border-bottom:3px solid transparent;cursor:pointer}
nav a:hover{color:#fff;background:rgba(255,255,255,.06)}
nav a.on{color:#fff;border-bottom-color:var(--laterite);font-weight:600}

/* Layout */
.wrap{max-width:1200px;margin:0 auto;padding:0 24px}
main section{display:none;padding-bottom:70px}
main section.on{display:block}
.eyebrow{font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--laterite);font-weight:700;margin-bottom:10px}
.pagetitle{font-family:var(--serif);font-size:34px;font-weight:600;color:var(--indigo);margin-bottom:8px;line-height:1.2}
.pagelead{font-size:17px;color:var(--gris);max-width:760px;margin-bottom:32px}
.pagehead{padding:44px 0 0}
.homehead{font-family:var(--serif);font-size:26px;color:var(--indigo);margin:52px 0 6px;font-weight:600}
.homesub{color:var(--gris);font-size:15px;margin-bottom:24px}

/* Hero */
.hero{background:var(--indigo);color:#fff;padding:64px 0 0;position:relative;overflow:hidden}
.hero .tifbg{position:absolute;right:-20px;top:6px;font-size:210px;color:rgba(255,255,255,.045);font-family:var(--serif);line-height:1;letter-spacing:.1em;user-select:none}
.hero h2{font-family:var(--serif);font-size:clamp(29px,4.5vw,45px);font-weight:600;line-height:1.18;max-width:720px}
.hero .sub{margin-top:16px;font-size:17px;color:#C9CEE6;max-width:640px}
.hero .actions{margin-top:28px;display:flex;gap:14px;flex-wrap:wrap}
.btn{display:inline-block;padding:12px 24px;border-radius:4px;font-size:14.5px;font-weight:600;cursor:pointer;border:none}
.btn.solid{background:var(--laterite);color:#fff}
.btn.solid:hover{background:#9E501B}
.btn.ghost{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.5)}
.statband{margin-top:52px;background:rgba(255,255,255,.06);border-top:1px solid rgba(255,255,255,.14)}
.statband .in{max-width:1200px;margin:0 auto;padding:20px 24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px}
.stat b{display:block;font-family:var(--serif);font-size:29px;color:#E9C46A;font-weight:600}
.stat span{font-size:12px;color:#C9CEE6;letter-spacing:.05em;text-transform:uppercase}

/* Slider */
.slider-mount{margin:42px 0 0}
.slider{position:relative;border-radius:6px;overflow:hidden;border:1px solid var(--ligne);background:var(--indigo)}
.strack{display:flex;transition:transform .6s ease}
.slide{min-width:100%;position:relative;margin:0}
.slide svg{display:block;width:100%;height:clamp(190px,32vw,370px)}
.slide figcaption{position:absolute;left:0;right:0;bottom:0;padding:38px 24px 15px;background:linear-gradient(transparent,rgba(20,28,66,.78));color:#fff;font-family:var(--serif);font-size:16.5px}
.sdots{position:absolute;bottom:13px;right:17px;display:flex;gap:8px}
.sdots button{width:10px;height:10px;border-radius:50%;border:none;background:rgba(255,255,255,.45);cursor:pointer;padding:0}
.sdots button.on{background:#fff}
.slidenote{font-size:12px;color:var(--gris);font-style:italic;margin-top:8px}

/* Cards */
.grid{display:grid;gap:22px}
.g3{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
.g2{grid-template-columns:repeat(auto-fill,minmax(360px,1fr))}
.card{background:var(--blanc);border:1px solid var(--ligne);border-radius:6px;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 8px 24px rgba(31,42,94,.10)}
.card .top{background:var(--indigo);color:#fff;padding:17px 20px 13px}
.card .top .endo{font-size:20px;color:#E9C46A;letter-spacing:.12em;font-family:var(--serif)}
.card .top h3{font-family:var(--serif);font-size:20px;font-weight:600;margin-top:2px}
.card .top .reg{font-size:11.5px;letter-spacing:.1em;text-transform:uppercase;color:#B9C0DE;margin-top:4px}
.card .body{padding:17px 20px 20px}
.card .body p{font-size:14px;color:var(--gris);margin-bottom:13px}
.tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:13px}
.tag{font-size:11px;padding:3px 10px;border-radius:20px;letter-spacing:.03em;font-weight:600}
.tag.state{background:#E3EBE6;color:var(--ok)}
.tag.achpr{background:#EFE3D4;color:#8A5A17}
.tag.self{background:#E4E7F2;color:var(--indigo)}
.tag.pastoral{background:var(--laterite-soft);color:var(--laterite)}
.linkmore{font-size:13.5px;color:var(--laterite);font-weight:600;cursor:pointer}
.linkmore:hover{text-decoration:underline}
.filterrow{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:24px}
.filterrow button{background:var(--blanc);border:1px solid var(--ligne);padding:7px 15px;border-radius:20px;font-size:13px;cursor:pointer;color:var(--gris)}
.filterrow button.on{background:var(--indigo);border-color:var(--indigo);color:#fff;font-weight:600}
.ctrysel{padding:9px 14px;border:1px solid var(--ligne);border-radius:4px;background:#fff;font-size:13.5px;font-family:var(--sans);margin-bottom:24px;max-width:280px}
.badge-cat{font-size:10.5px;letter-spacing:.07em;text-transform:uppercase;font-weight:700;padding:3px 10px;border-radius:20px;background:var(--sable-2);color:var(--indigo);display:inline-block;margin-bottom:9px}

/* Fiche */
.crumb{font-size:13px;color:var(--gris);margin:0 0 6px}
.crumb a{color:var(--laterite);cursor:pointer;font-weight:600;text-decoration:none}
.ftoolbar{display:flex;gap:10px;margin:14px 0 0;flex-wrap:wrap}
.ftoolbar button{background:#fff;border:1px solid var(--ligne);border-radius:4px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--indigo);font-weight:600}
.ftoolbar button:hover{border-color:var(--indigo)}
.fiche{background:var(--blanc);border:1px solid var(--ligne);border-radius:6px;margin-top:18px}
.fiche-head{background:var(--indigo);color:#fff;padding:32px 36px;border-radius:6px 6px 0 0;position:relative;overflow:hidden}
.fiche-head .tifbg{position:absolute;right:18px;top:-14px;font-size:120px;color:rgba(255,255,255,.06);font-family:var(--serif);letter-spacing:.1em;user-select:none}
.fiche-head .doc{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:#B9C0DE;margin-bottom:11px}
.fiche-head .endo{font-family:var(--serif);font-size:32px;color:#E9C46A;letter-spacing:.14em}
.fiche-head h3{font-family:var(--serif);font-size:31px;font-weight:600;margin-top:4px}
.fiche-head .aka{font-size:14px;color:#C9CEE6;margin-top:6px;font-style:italic}
.fiche-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));border-bottom:1px solid var(--ligne);background:var(--sable-2)}
.fiche-meta>div{padding:15px 20px;border-right:1px solid var(--ligne)}
.fiche-meta>div:last-child{border-right:none}
.fiche-meta label{display:block;font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--gris);margin-bottom:4px;font-weight:700}
.fiche-meta b{font-size:14.5px;color:var(--indigo)}
.fiche-body{padding:34px 36px;display:grid;grid-template-columns:1fr 290px;gap:42px}
.fsec{margin-bottom:30px}
.fsec h4{font-family:var(--serif);font-size:19px;color:var(--indigo);border-bottom:2px solid var(--laterite);display:inline-block;padding-bottom:4px;margin-bottom:13px;font-weight:600}
.fsec p{font-size:15px}
.sidebox{background:var(--sable);border:1px solid var(--ligne);border-radius:6px;padding:19px 21px;margin-bottom:18px}
.sidebox h5{font-size:11.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--laterite);margin-bottom:11px;font-weight:700}
.sidebox table{width:100%;font-size:13.5px;border-collapse:collapse}
.sidebox td{padding:6px 0;border-bottom:1px solid var(--ligne);vertical-align:top}
.sidebox td:first-child{color:var(--gris);padding-right:10px}
.sidebox td:last-child{font-weight:600;color:var(--indigo);text-align:right}
.sidebox p{font-size:13px;color:var(--gris)}
.tklabel{display:flex;gap:12px;background:#F4EEE2;border:1px dashed var(--laterite);border-radius:6px;padding:14px 16px;font-size:13px;color:#6B4A22}
.notice{background:#EDEFF7;border-left:4px solid var(--indigo);padding:13px 17px;font-size:13.5px;color:var(--indigo);margin-bottom:24px;border-radius:0 4px 4px 0}

/* Featured */
.featured{background:var(--blanc);border:1px solid var(--ligne);border-radius:6px;display:grid;grid-template-columns:330px 1fr;overflow:hidden;margin:42px 0 0}
.featured .left{background:var(--indigo);color:#fff;padding:32px;display:flex;flex-direction:column;justify-content:center}
.featured .left .lbl{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#B9C0DE;margin-bottom:10px}
.featured .left .endo{font-family:var(--serif);font-size:36px;color:#E9C46A;letter-spacing:.14em}
.featured .left h3{font-family:var(--serif);font-size:25px;margin-top:6px;font-weight:600}
.featured .left .reg{font-size:13px;color:#C9CEE6;margin-top:8px}
.featured .right{padding:32px 36px}
.featured .right p{font-size:15px;color:var(--gris);margin:12px 0 20px}

/* Map */
#map{height:520px;border-radius:6px;border:1px solid var(--ligne);z-index:1}
.maplegend{display:flex;gap:22px;flex-wrap:wrap;margin-top:14px;font-size:13px;color:var(--gris)}
.maplegend i{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:-1px}
.mapnote{margin-top:14px;font-size:13px;color:var(--gris);font-style:italic;max-width:760px}

/* Rights table */
.rtable{width:100%;border-collapse:collapse;background:var(--blanc);border:1px solid var(--ligne);font-size:14px}
.rtable th{background:var(--indigo);color:#fff;text-align:left;padding:12px 16px;font-size:12px;letter-spacing:.08em;text-transform:uppercase}
.rtable td{padding:12px 16px;border-bottom:1px solid var(--ligne);vertical-align:top}
.rtable td b{color:var(--indigo)}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.pill.bind{background:#E3EBE6;color:var(--ok)}
.pill.soft{background:#E4E7F2;color:var(--indigo)}

/* News / agenda */
.newsitem{background:var(--blanc);border:1px solid var(--ligne);border-radius:6px;padding:20px 22px;margin-bottom:15px;display:flex;gap:18px}
.newsitem .date{min-width:70px;text-align:center;background:var(--sable-2);border-radius:6px;padding:9px 6px;align-self:flex-start}
.newsitem .date b{display:block;font-family:var(--serif);font-size:21px;color:var(--indigo)}
.newsitem .date span{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--gris)}
.newsitem h4{font-family:var(--serif);font-size:17.5px;color:var(--indigo);margin-bottom:5px;font-weight:600}
.newsitem p{font-size:14px;color:var(--gris)}
.newsitem .src{font-size:12px;color:var(--laterite);font-weight:600;margin-top:6px;display:block}
.opp{border-left:4px solid var(--laterite)}
.deadline{display:inline-block;background:#F6E7DA;color:var(--laterite);font-size:12px;font-weight:700;padding:3px 12px;border-radius:20px;margin-top:8px}

/* Blocks */
.secblock{background:var(--blanc);border:1px solid var(--ligne);border-radius:6px;padding:26px 28px}
.secblock h4{font-family:var(--serif);font-size:20px;color:var(--indigo);margin-bottom:9px}
.secblock p{font-size:14.5px;color:#3E3B34}
.partnerstrip{display:flex;gap:13px;flex-wrap:wrap;margin-top:18px}
.partnerstrip span{background:var(--blanc);border:1px solid var(--ligne);border-radius:4px;padding:11px 20px;font-size:13px;color:var(--gris);font-weight:600}

/* Join form */
.joinbox{background:var(--blanc);border:1px solid var(--ligne);border-left:4px solid var(--laterite);border-radius:6px;padding:28px 30px;margin-top:46px}
.joinbox h3{font-family:var(--serif);font-size:22px;color:var(--indigo);margin-bottom:6px}
.joinbox>p{font-size:14px;color:var(--gris);margin-bottom:18px}
.jgrid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.jgrid .full{grid-column:1/-1}
.jfield label{display:block;font-size:11.5px;letter-spacing:.07em;text-transform:uppercase;color:var(--gris);font-weight:700;margin-bottom:5px}
.jfield input,.jfield select,.jfield textarea{width:100%;padding:10px 12px;border:1px solid var(--ligne);border-radius:4px;font-size:14px;font-family:var(--sans);background:#fff}
.jfield textarea{min-height:88px;resize:vertical}
.jok{display:none;background:#E3EBE6;color:var(--ok);padding:12px 16px;border-radius:4px;font-size:14px;font-weight:600;margin-top:15px}
.jerr{display:none;background:#F6E0DA;color:#8A3A22;padding:12px 16px;border-radius:4px;font-size:13.5px;font-weight:600;margin-top:15px}

/* Search modal */
.smodal{display:none;position:fixed;inset:0;background:rgba(20,28,66,.55);z-index:3000}
.smodal.on{display:flex;align-items:flex-start;justify-content:center;padding:11vh 20px 0}
.sbox{background:#fff;border-radius:8px;width:100%;max-width:620px;box-shadow:0 24px 64px rgba(0,0,0,.3);overflow:hidden}
.sbox input{width:100%;border:none;padding:17px 22px;font-size:17px;outline:none;border-bottom:1px solid var(--ligne);font-family:var(--sans)}
.sres{max-height:50vh;overflow-y:auto}
.sres .sitem{display:block;padding:12px 22px;color:var(--encre);border-bottom:1px solid var(--sable-2);cursor:pointer}
.sres .sitem:hover{background:var(--sable)}
.sres .sitem b{color:var(--indigo);font-family:var(--serif);font-size:15.5px;display:block}
.sres .sitem span{font-size:12.5px;color:var(--gris)}
.sres .kind{float:right;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--laterite);font-weight:700;margin-top:3px}
.sempty{padding:26px;color:var(--gris);font-size:14px;text-align:center}

/* Footer */
footer{background:var(--indigo-deep);color:#B9C0DE}
footer .in{max-width:1200px;margin:0 auto;padding:46px 24px 28px;display:grid;grid-template-columns:2fr 1fr 1fr 1.4fr;gap:34px}
footer h6{color:#fff;font-size:12px;letter-spacing:.15em;text-transform:uppercase;margin-bottom:13px}
footer .flink{color:#B9C0DE;display:block;font-size:13.5px;margin-bottom:8px;cursor:pointer}
footer .flink:hover{color:#fff}
footer .base{border-top:1px solid rgba(255,255,255,.12);text-align:center;padding:15px;font-size:12px;color:#7C84AB}
.socials{display:flex;gap:12px;margin-top:16px}
.socials a{width:36px;height:36px;border:1px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center}
.socials a:hover{background:rgba(255,255,255,.12)}
.socials svg{width:17px;height:17px;fill:#C9CEE6}
.nlform{display:flex;gap:8px;margin-top:10px}
.nlform input{flex:1;padding:10px 12px;border-radius:4px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.08);color:#fff;font-size:13.5px;min-width:0}
.nlform input::placeholder{color:#8E96BE}
.nlform button{background:var(--laterite);border:none;color:#fff;padding:10px 15px;border-radius:4px;font-weight:600;cursor:pointer;font-size:13.5px}
.nlok{color:#8FD3AE;font-size:13px;margin-top:8px;display:none}

/* Responsive */
@media(max-width:900px){
  .fiche-body{grid-template-columns:1fr}
  .featured{grid-template-columns:1fr}
  footer .in{grid-template-columns:1fr 1fr}
}
@media(max-width:600px){
  body{font-size:15px}
  .wrap{padding:0 16px}
  .topbar span:last-child{display:none}
  .brandrow{padding:11px 16px}
  .brand h1{font-size:17px}
  .brand .mark{width:38px;height:38px;font-size:18px}
  .searchbtn span.lbl,.searchbtn kbd{display:none}
  .cta{padding:8px 12px;font-size:12.5px}
  nav a{padding:11px 12px;font-size:12.5px}
  .hero{padding:42px 0 0}
  .hero .tifbg{font-size:110px;right:-30px}
  .statband .in{grid-template-columns:1fr 1fr}
  .stat b{font-size:23px}
  .pagetitle{font-size:26px}
  .pagehead{padding:32px 0 0}
  .fiche-head{padding:22px 18px}
  .fiche-head .endo{font-size:25px}
  .fiche-head h3{font-size:23px}
  .fiche-body{padding:22px 18px;gap:26px}
  .fiche-meta{grid-template-columns:1fr 1fr}
  .featured .left,.featured .right{padding:22px 18px}
  .newsitem{flex-direction:column;gap:10px}
  .newsitem .date{display:flex;gap:8px;align-items:baseline;padding:5px 12px}
  .newsitem .date b{font-size:16px}
  footer .in{grid-template-columns:1fr;gap:24px;padding:34px 16px 22px}
  #map{height:380px}
  .jgrid{grid-template-columns:1fr}
  .joinbox{padding:20px 16px}
  .slide figcaption{font-size:14px;padding:28px 15px 11px}
}
@media print{
  .topbar,header,footer,.ftoolbar,.crumb,.linkmore,.smodal{display:none!important}
  body{background:#fff}
  main section{padding:0}
  .fiche{border:none}
  .fiche-head,.fiche-meta,.tag,.tklabel,.sidebox{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
</style>
</head>
<body>

<div class="smodal" id="smodal" role="dialog" aria-modal="true">
  <div class="sbox">
    <input id="sinput" type="search" autocomplete="off">
    <div class="sres" id="sres"></div>
  </div>
</div>

<div class="topbar"><span class="tif">ⴰⴾⴰⵍ</span><span id="tb-txt"></span></div>

<header>

var FICHE_KT={
fr:{ident:"Les Kel Tamasheq (« ceux qui parlent le tamasheq »), désignés par l'exonyme « Touaregs », forment un peuple berbérophone du Sahara central et du Sahel. Leur langue, le tamasheq, s'écrit en tifinagh, l'un des rares systèmes d'écriture autochtones africains en usage continu. L'organisation sociale traditionnelle s'articule en confédérations (ettebel) — Kel Ahaggar, Kel Ajjer, Kel Aïr, Iwellemmedan, Kel Adagh notamment.",
mode:"L'économie repose historiquement sur le pastoralisme mobile — dromadaires, caprins, ovins — associé au commerce caravanier transsaharien (sel, dattes, céréales). La mobilité n'est pas une errance mais un système raisonné d'exploitation des parcours, fondé sur une connaissance fine de l'eau, des pâturages et du climat. Les femmes occupent une place importante : transmission de l'écriture, propriété du bétail et de la tente, poésie (tisiway).",
droits:"Reconnus comme peuple autochtone par le Groupe de travail de la Commission africaine (CADHP). Aucun État de leur aire (Mali, Niger, Algérie, Libye, Burkina Faso) n'a ratifié la Convention 169 de l'OIT. La DNUDPA (2007) constitue le cadre de référence : articles 3 (autodétermination), 26 (terres et territoires), 31 (savoirs et expressions culturelles). Participation active à l'UNPFII et aux réseaux climat (CCNUCC, CDB).",
menaces:"Sécheresses récurrentes et dérèglement climatique ; insécurité et conflits armés au Sahel entraînant des déplacements massifs ; rétrécissement des espaces pastoraux (agriculture, aires protégées, projets miniers et énergétiques) ; fermetures de frontières entravant la transhumance. Résilience : associations de femmes (Tin Hinan), renaissance culturelle (musique, festivals), plaidoyer international croissant porté par une jeunesse connectée."},
en:{ident:"The Kel Tamasheq (\u201cthose who speak Tamasheq\u201d), known by the exonym \u201cTuareg\u201d, are a Berber-speaking people of the central Sahara and Sahel. Their language, Tamasheq, is written in Tifinagh — one of the few African indigenous scripts in continuous use. Traditional social organization is built around confederations (ettebel) — notably Kel Ahaggar, Kel Ajjer, Kel Aïr, Iwellemmedan and Kel Adagh.",
mode:"The economy historically rests on mobile pastoralism — dromedaries, goats, sheep — combined with trans-Saharan caravan trade (salt, dates, grain). Mobility is not wandering but a reasoned rangeland-management system grounded in fine knowledge of water, pasture and climate. Women hold an important position: transmission of the script, ownership of livestock and the tent, poetry (tisiway).",
droits:"Recognized as an indigenous people by the Working Group of the African Commission (ACHPR). No state in their area (Mali, Niger, Algeria, Libya, Burkina Faso) has ratified ILO Convention 169. UNDRIP (2007) is the reference framework: articles 3 (self-determination), 26 (lands and territories), 31 (knowledge and cultural expressions). Active participation in UNPFII and climate networks (UNFCCC, CBD).",
menaces:"Recurring droughts and climate disruption; insecurity and armed conflict in the Sahel driving mass displacement; shrinking pastoral space (agriculture, protected areas, mining and energy projects); border closures constraining transhumance. Resilience: women's associations (Tin Hinan), cultural renaissance (music, festivals), growing international advocacy carried by a connected youth."}};

/* ================= NAVIGATION ================= */
function show(v){
  VIEW=v;
  var secs=document.querySelectorAll('main section');
  for(var i=0;i<secs.length;i++)secs[i].classList.remove('on');
  $('v-'+v).classList.add('on');
  var links=document.querySelectorAll('nav a');
  for(var j=0;j<links.length;j++)links[j].classList.remove('on');
  var n=$('n-'+(v==='fiche'?'peoples':v));
  if(n)n.classList.add('on');
  window.scrollTo(0,0);
  if(v==='map')setTimeout(initMap,60);
}
function setLang(l){
  LANG=l;
  renderAll();
  if(VIEW==='fiche'&&CURFICHE)renderFiche(CURFICHE);
}

/* ================= RENDERERS ================= */
function tags(p){
  var h='';
  if(p.pastoral)h+='<span class="tag pastoral">'+STATUS.pastoral[LANG]+'</span>';
  for(var i=0;i<p.status.length;i++){var s=STATUS[p.status[i]];h+='<span class="tag '+s.cls+'">'+s[LANG]+'</span>';}
  return h;
}
function renderFilters(){
  var h='<button class="'+(FILTER==='all'?'on':'')+'" onclick="FILTER=\'all\';renderFilters();renderPeoples()">'+I('all_regions')+'</button>';
  for(var r in REGIONS)h+='<button class="'+(FILTER===r?'on':'')+'" onclick="FILTER=\''+r+'\';renderFilters();renderPeoples()">'+REGIONS[r][LANG]+'</button>';
  $('regionfilters').innerHTML=h;
}
function renderPeoples(){
  var h='';
  for(var i=0;i<PEOPLES.length;i++){
    var p=PEOPLES[i];
    if(FILTER!=='all'&&p.region!==FILTER)continue;
    h+='<div class="card"><div class="top"><div class="endo">'+p.endo+'</div><h3>'+p.name+'</h3><div class="reg">'+REGIONS[p.region][LANG]+' · '+P(p.countries)+'</div></div>'
      +'<div class="body"><div class="tags">'+tags(p)+'</div><p>'+P(p.desc)+'</p>'
      +'<span class="linkmore" onclick="openFiche(\''+p.id+'\')">'+I('feat_cta')+' →</span></div></div>';
  }
  $('peoplegrid').innerHTML=h;
  $('st-p').textContent=PEOPLES.length;
}
function renderFeatured(){
  var p=PEOPLES[0];
  $('featured').innerHTML='<div class="left"><div class="lbl">'+I('feat_lbl')+'</div><div class="endo">'+p.endo+'</div><h3>'+p.name+'</h3><div class="reg">'+P(p.countries)+'</div></div>'
    +'<div class="right"><div class="tags">'+tags(p)+'</div><p>'+P(p.desc)+'</p>'
    +'<button class="btn solid" onclick="openFiche(\''+p.id+'\')">'+I('feat_cta')+'</button></div>';
}
function newsHTML(n){
  return '<div class="newsitem"><div class="date"><b>'+n.d+'</b><span>'+P(n.m)+'</span></div>'
    +'<div><h4>'+P(n.t)+'</h4><p>'+P(n.p)+'</p><span class="src">'+P(n.s)+'</span></div></div>';
}
function renderNews(){
  var h='',hh='';
  for(var i=0;i<NEWS.length;i++){h+=newsHTML(NEWS[i]);if(i<2)hh+=newsHTML(NEWS[i]);}
  $('newslist').innerHTML=h;
  $('home-news').innerHTML=hh;
}
function renderOpps(){
  var h='';
  for(var i=0;i<OPPS.length;i++){
    var o=OPPS[i];
    h+='<div class="newsitem opp"><div style="flex:1"><h4>'+P(o.t)+'</h4><p>'+P(o.p)+'</p><span class="deadline">'+P(o.dl)+'</span></div></div>';
  }

}
function renderOrgs(){
  var h='';
  for(var c in CATS)h+='<button class="'+(ORGCAT===c?'on':'')+'" onclick="ORGCAT=\''+c+'\';renderOrgs()">'+CATS[c][LANG]+'</button>';
  $('orgcats').innerHTML=h;
  var used=['all'],i;
  for(i=0;i<ORGS.length;i++)if(used.indexOf(ORGS[i].ctry)<0)used.push(ORGS[i].ctry);
  var oh='';
  for(i=0;i<used.length;i++)oh+='<option value="'+used[i]+'"'+(ORGCTRY===used[i]?' selected':'')+'>'+COUNTRIES[used[i]][LANG]+'</option>';
  $('orgctry').innerHTML=oh;
  var g='';var count=0;
  for(i=0;i<ORGS.length;i++){
    var o=ORGS[i];
    if(ORGCAT!=='all'&&o.cat!==ORGCAT)continue;
    if(ORGCTRY!=='all'&&o.ctry!==ORGCTRY)continue;
    count++;
    g+='<div class="card"><div class="body" style="padding-top:22px"><span class="badge-cat">'+CATS[o.cat][LANG]+'</span>'
      +'<h3 style="font-family:var(--serif);font-size:19px;color:var(--indigo);margin-bottom:4px">'+o.n+'</h3>'
      +'<div style="font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--laterite);font-weight:700;margin-bottom:10px">'+COUNTRIES[o.ctry][LANG]+'</div>'
      +'<p style="font-size:14px;color:var(--gris)">'+P(o.m)+'</p></div></div>';
  }
  $('orggrid').innerHTML=count?g:'<p style="color:var(--gris)">'+I('search_empty')+'</p>';

}

function openFiche(id){renderFiche(id);show('fiche');}

  var p=null;
  for(var i=0;i<PEOPLES.length;i++)if(PEOPLES[i].id===id)p=PEOPLES[i];
  if(!p)return;
  var body='',notice='';
  if(p.full){
    var cl=FICHE_KT[LANG]?LANG:'en';
    if(!FICHE_KT[LANG])notice='<div class="notice">'+I('fiche_tr')+'</div>';
    var c=FICHE_KT[cl],hh=FH[cl]||FH.en,keys=['ident','mode','droits','menaces'];
    for(var k=0;k<keys.length;k++)body+='<div class="fsec"><h4>'+hh[keys[k]]+'</h4><p>'+c[keys[k]]+'</p></div>';
  }else{
    notice='<div class="notice">'+I('fiche_wip')+'</div>';
    body='<div class="fsec"><p>'+P(p.desc)+'</p></div>';
  }
  var st='';
  for(var s=0;s<p.status.length;s++){st+=(s?' · ':'')+STATUS[p.status[s]][LANG];}
  $('fichewrap').innerHTML=
   '<div class="crumb"><a onclick="show(\'peoples\')">'+I('nav')[1]+'</a> › '+REGIONS[p.region][LANG]+' › <b>'+p.name+'</b></div>'
  +'<span class="linkmore" onclick="show(\'peoples\')">'+I('back')+'</span>'
  +'<div class="ftoolbar"><button onclick="window.print()">'+I('print')+'</button></div>'
  +'<div class="fiche">'
  +'<div class="fiche-head"><div class="tifbg">'+p.endo.slice(0,4)+'</div>'
  +'<div class="doc">'+I('fiche_doc')+' · AK-'+p.id.toUpperCase().slice(0,6)+'-2026</div>'
  +'<div class="endo">'+p.endo+'</div><h3>'+p.name+'</h3><div class="aka">'+REGIONS[p.region][LANG]+'</div></div>'
  +'<div class="fiche-meta">'
  +'<div><label>'+I('fiche_pop')+'</label><b>'+p.pop+'</b></div>'
  +'<div><label>'+I('fiche_lang')+'</label><b>'+P(p.lang)+'</b></div>'
  +'<div><label>'+I('fiche_countries')+'</label><b>'+P(p.countries)+'</b></div>'
  +'<div><label>'+I('fiche_status')+'</label><b>'+st+'</b></div></div>'
  +'<div class="fiche-body"><div>'+notice+body
  +'<div class="tklabel"><span style="font-size:20px">◈</span><span>'+I('tk')+'</span></div></div>'
  +'<div>'
  +'<div class="sidebox"><h5>'+I('kf')+'</h5><table>'
  +'<tr><td>'+I('fiche_pop')+'</td><td>'+p.pop+'</td></tr>'
  +'<tr><td>'+I('fiche_region')+'</td><td>'+REGIONS[p.region][LANG]+'</td></tr>'
  +'<tr><td>'+I('fiche_status')+'</td><td>'+STATUS[p.status[0]][LANG]+'</td></tr></table></div>'
  +'<div class="sidebox"><h5>'+I('instr')+'</h5><table>'
  +'<tr><td>UNDRIP / DNUDPA</td><td>✓</td></tr><tr><td>ILO C169</td><td>—</td></tr>'
  +'<tr><td>CBD 8(j)</td><td>✓</td></tr><tr><td>ACHPR / CADHP</td><td>✓</td></tr></table></div>'
  +'<div class="sidebox"><h5>'+I('src')+'</h5><p>'+I('src_txt')+'</p></div>'
  +'</div></div></div>';
}

/* ================= SLIDERS ================= */
function mountSlider(id,slides){
  var el=$(id);if(!el)return;
  var rm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var figs='',dots='';
  for(var i=0;i<slides.length;i++){
    figs+='<figure class="slide">'+slides[i].svg+'<figcaption>'+P(slides[i].cap)+'</figcaption></figure>';
    dots+='<button data-i="'+i+'" aria-label="Slide '+(i+1)+'"></button>';
  }
  el.innerHTML='<div class="slider"><div class="strack">'+figs+'</div><div class="sdots">'+dots+'</div></div><p class="slidenote">'+I('slider_note')+'</p>';
  var track=el.querySelector('.strack');
  var btns=el.querySelectorAll('.sdots button');
  var cur=0;
  function goTo(n){
    cur=(n+slides.length)%slides.length;
    track.style.transform='translateX(-'+(cur*100)+'%)';
    for(var b=0;b<btns.length;b++)btns[b].classList.toggle('on',b===cur);
  }
  function start(){if(!rm)TIMERS[id]=setInterval(function(){goTo(cur+1)},6000)}
  function stop(){if(TIMERS[id])clearInterval(TIMERS[id])}
  for(var b=0;b<btns.length;b++){
    (function(btn){btn.onclick=function(){goTo(parseInt(btn.getAttribute('data-i'),10));stop();start();}})(btns[b]);
  }
  var sl=el.querySelector('.slider');
  sl.addEventListener('mouseenter',stop);
  sl.addEventListener('mouseleave',function(){stop();start();});
  var x0=null;
  track.addEventListener('touchstart',function(e){x0=e.touches[0].clientX},{passive:true});
  track.addEventListener('touchend',function(e){
    if(x0===null)return;
    var dx=e.changedTouches[0].clientX-x0;
    if(Math.abs(dx)>40)goTo(cur+(dx<0?1:-1));
    x0=null;stop();start();
  },{passive:true});
  stop();goTo(0);start();
}

/* ================= SEARCH ================= */
function openSearch(){$('smodal').classList.add('on');$('sinput').value='';doSearch('');setTimeout(function(){$('sinput').focus()},30);}
function closeSearch(){$('smodal').classList.remove('on');}
function doSearch(q){
  q=q.trim().toLowerCase();
  var ix=[],i;
  for(i=0;i<PEOPLES.length;i++){var p=PEOPLES[i];ix.push({k:I('kinds').p,t:p.name,s:P(p.countries),act:"openFiche('"+p.id+"')",h:(p.name+' '+p.endo+' '+P(p.desc)+' '+P(p.countries)).toLowerCase()});}
  for(i=0;i<ORGS.length;i++){var o=ORGS[i];ix.push({k:I('kinds').o,t:o.n,s:P(o.m),act:"show('orgs')",h:(o.n+' '+P(o.m)).toLowerCase()});}
  for(i=0;i<NEWS.length;i++){var n=NEWS[i];ix.push({k:I('kinds').n,t:P(n.t),s:P(n.s),act:"show('news')",h:(P(n.t)+' '+P(n.p)).toLowerCase()});}
  for(i=0;i<OPPS.length;i++){var op=OPPS[i];ix.push({k:I('kinds').c,t:P(op.t),s:P(op.dl),act:"show('news')",h:(P(op.t)+' '+P(op.p)).toLowerCase()});}
  var res=[];
  for(i=0;i<ix.length;i++){if(!q||ix[i].h.indexOf(q)>=0)res.push(ix[i]);if(res.length>=8)break;}
  var h='';
  for(i=0;i<res.length;i++)h+='<div class="sitem" onclick="closeSearch();'+res[i].act+'"><span class="kind">'+res[i].k+'</span><b>'+res[i].t+'</b><span>'+res[i].s+'</span></div>';
  $('sres').innerHTML=h||'<div class="sempty">'+I('search_empty')+'</div>';
}
$('sinput').addEventListener('input',function(){doSearch(this.value)});
$('sinput').addEventListener('keydown',function(e){if(e.key==='Escape')closeSearch()});
$('smodal').addEventListener('click',function(e){if(e.target===this)closeSearch()});
document.addEventListener('keydown',function(e){
  var typing=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA');
  if(e.key==='/'&&!typing&&!$('smodal').classList.contains('on')){e.preventDefault();openSearch();}
  if(e.key==='Escape')closeSearch();
});

/* ================= MAP ================= */
function initMap(){
  if(MAP){MAP.invalidateSize();return;}
  if(typeof L==='undefined')return;
  MAP=L.map('map',{scrollWheelZoom:false}).setView([15,10],2);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:8}).addTo(MAP);
  for(var i=0;i<PEOPLES.length;i++){
    (function(p){
      var col=p.pastoral?'#B45E23':'#1F2A5E';
      var c=L.circle(p.coords,{radius:p.r,color:col,weight:1.5,fillColor:col,fillOpacity:.22}).addTo(MAP);
      c.bindPopup('<div style="font-family:Georgia,serif;font-size:16px;color:#1F2A5E;font-weight:600">'+p.name+'</div>'
        +'<div style="font-size:12px;color:#6B675E;margin:2px 0 6px">'+P(p.countries)+'</div>'
        +'<span style="color:#B45E23;font-weight:600;font-size:13px;cursor:pointer" onclick="openFiche(\''+p.id+'\')">'+I('feat_cta')+' →</span>');
    })(PEOPLES[i]);
  }
}

function renderAll(){
  applyTexts();

renderAll();
show('home');
